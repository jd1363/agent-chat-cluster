<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Cluster 鈥?Control Dashboard</title>

<!-- Google Fonts: Inter + JetBrains Mono -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Tailwind via CDN (utility-only, no design system override) -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Lucide icons -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<style>
  /* 鈹€鈹€ SuperDesign Dark Theme (oklch) 鈹€鈹€ */
  :root {
    --background:     oklch(0.11 0.015 260);
    --surface:        oklch(0.15 0.018 260);
    --surface-2:      oklch(0.18 0.020 260);
    --foreground:     oklch(0.93 0.008 260);
    --foreground-2:   oklch(0.70 0.015 260);
    --primary:        oklch(0.65 0.18 255);
    --primary-hover:  oklch(0.70 0.20 255);
    --primary-muted:  oklch(0.30 0.12 255 / 0.25);
    --success:        oklch(0.65 0.18 150);
    --success-muted:  oklch(0.65 0.18 150 / 0.15);
    --warning:        oklch(0.75 0.18 80);
    --warning-muted:  oklch(0.75 0.18 80 / 0.15);
    --danger:         oklch(0.62 0.20 25);
    --danger-muted:   oklch(0.62 0.20 25 / 0.15);
    --accent:         oklch(0.72 0.14 280);
    --border:         oklch(0.22 0.025 260);
    --border-light:   oklch(0.28 0.030 260);
    --shadow-sm:      0 1px 3px oklch(0 0 0 / 0.25);
    --shadow-md:      0 4px 12px oklch(0 0 0 / 0.30);
    --radius:         0.5rem;
    --radius-lg:      0.75rem;
    --space:          4px;
    --font-sans:      'Inter', system-ui, -apple-system, sans-serif;
    --font-mono:      'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
    --transition:     150ms ease-out;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: var(--background);
    color: var(--foreground);
    font-family: var(--font-sans);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* 鈹€鈹€ Scrollbar 鈹€鈹€ */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--foreground-2); }

  /* 鈹€鈹€ Layout 鈹€鈹€ */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .app-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: -0.02em;
  }
  .app-logo .badge {
    background: var(--primary-muted);
    color: var(--primary);
    font-size: 0.65rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 99px;
    letter-spacing: 0.02em;
    font-family: var(--font-mono);
  }

  .app-header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .status-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8rem;
    color: var(--foreground-2);
    font-family: var(--font-mono);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--success);
    display: inline-block;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .dashboard-grid {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 20px;
    padding: 20px 24px;
    max-width: 1600px;
    margin: 0 auto;
    min-height: calc(100vh - 60px);
    align-items: start;
  }

  /* 鈹€鈹€ KPI Row 鈹€鈹€ */
  .kpi-row {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
    cursor: default;
  }
  .kpi-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    border-color: var(--border-light);
  }
  .kpi-card .kpi-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--foreground-2);
    margin-bottom: 6px;
  }
  .kpi-card .kpi-value {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
  }
  .kpi-card .kpi-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--surface-2);
    color: var(--foreground-2);
    flex-shrink: 0;
  }
  .kpi-card .kpi-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .kpi-total .kpi-value { color: var(--foreground); }
  .kpi-running .kpi-value { color: var(--primary); }
  .kpi-done .kpi-value { color: var(--success); }
  .kpi-failed .kpi-value { color: var(--danger); }
  .kpi-agents .kpi-value { color: var(--accent); }

  /* 鈹€鈹€ Left Column: Tasks 鈹€鈹€ */
  .tasks-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    animation: fadeIn 350ms ease-out;
  }

  .tasks-panel-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .tasks-panel-header h2 {
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  /* 鈹€鈹€ Filter Tabs 鈹€鈹€ */
  .filter-tabs {
    display: flex;
    gap: 2px;
    padding: 0 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    overflow-x: auto;
    flex-shrink: 0;
  }
  .filter-tab {
    padding: 10px 14px;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--foreground-2);
    border: none;
    background: transparent;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color var(--transition), border-color var(--transition);
    white-space: nowrap;
    font-family: var(--font-sans);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .filter-tab:hover { color: var(--foreground); }
  .filter-tab.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
  }
  .filter-tab .count-badge {
    font-size: 0.6rem;
    font-family: var(--font-mono);
    background: var(--surface-2);
    color: var(--foreground-2);
    padding: 1px 6px;
    border-radius: 99px;
    min-width: 18px;
    text-align: center;
  }
  .filter-tab.active .count-badge {
    background: var(--primary-muted);
    color: var(--primary);
  }

  /* 鈹€鈹€ Toolbar 鈹€鈹€ */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .toolbar-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--foreground);
    font-size: 0.75rem;
    font-weight: 500;
    font-family: var(--font-sans);
    cursor: pointer;
    transition: all var(--transition);
  }
  .toolbar-btn:hover {
    background: var(--surface-2);
    border-color: var(--border-light);
    transform: translateY(-1px);
  }
  .toolbar-btn.primary {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
  }
  .toolbar-btn.primary:hover {
    background: var(--primary-hover);
    border-color: var(--primary-hover);
  }
  .toolbar-btn.danger {
    color: var(--danger);
    border-color: transparent;
  }
  .toolbar-btn.danger:hover {
    background: var(--danger-muted);
    border-color: var(--danger);
  }
  .toolbar-spacer { flex: 1; }
  .toolbar-search {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
  }
  .toolbar-search input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--foreground);
    font-size: 0.75rem;
    font-family: var(--font-sans);
    width: 140px;
  }
  .toolbar-search input::placeholder { color: var(--foreground-2); }

  /* 鈹€鈹€ Task Table 鈹€鈹€ */
  .task-table-wrapper {
    overflow-y: auto;
    flex: 1;
    min-height: 300px;
  }
  .task-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }
  .task-table thead {
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 2;
  }
  .task-table th {
    text-align: left;
    padding: 10px 14px;
    font-weight: 600;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--foreground-2);
    border-bottom: 1px solid var(--border);
  }
  .task-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--foreground);
    transition: background var(--transition);
  }
  .task-table tbody tr {
    cursor: pointer;
    transition: background var(--transition);
  }
  .task-table tbody tr:hover {
    background: oklch(0.18 0.02 260 / 0.6);
  }
  .task-table tbody tr.selected {
    background: var(--primary-muted);
    border-left: 2px solid var(--primary);
  }
  .task-table .task-id {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--foreground-2);
  }
  .task-table .task-title {
    font-weight: 500;
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* 鈹€鈹€ Status badges 鈹€鈹€ */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.01em;
    text-transform: capitalize;
  }
  .status-badge.pending {
    background: oklch(0.25 0.02 260);
    color: var(--foreground-2);
  }
  .status-badge.in_progress {
    background: var(--primary-muted);
    color: var(--primary);
  }
  .status-badge.done {
    background: var(--success-muted);
    color: var(--success);
  }
  .status-badge.failed {
    background: var(--danger-muted);
    color: var(--danger);
  }
  .status-badge.cancelled {
    background: oklch(0.25 0.02 260);
    color: var(--foreground-2);
    text-decoration: line-through;
  }

  .priority-badge {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-right: 4px;
  }
  .priority-badge.critical { background: var(--danger); }
  .priority-badge.high { background: var(--warning); }
  .priority-badge.medium { background: var(--primary); }
  .priority-badge.low { background: var(--foreground-2); }

  /* 鈹€鈹€ Right Panel: Detail 鈹€鈹€ */
  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    display: flex;
    flex-direction: column;
    animation: fadeIn 400ms ease-out;
    position: sticky;
    top: 80px;
    max-height: calc(100vh - 100px);
    overflow-y: auto;
  }
  .detail-header {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .detail-header h3 {
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .detail-close {
    background: none;
    border: none;
    color: var(--foreground-2);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    transition: all var(--transition);
  }
  .detail-close:hover {
    background: var(--surface-2);
    color: var(--foreground);
  }
  .detail-body {
    padding: 18px;
    flex: 1;
  }
  .detail-section {
    margin-bottom: 20px;
  }
  .detail-section h4 {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--foreground-2);
    margin-bottom: 8px;
  }
  .detail-field {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 0.78rem;
    border-bottom: 1px solid var(--border);
  }
  .detail-field:last-child { border-bottom: none; }
  .detail-field .field-label {
    color: var(--foreground-2);
  }
  .detail-field .field-value {
    font-weight: 500;
    text-align: right;
    max-width: 55%;
    word-break: break-word;
  }
  .detail-field .field-value.mono {
    font-family: var(--font-mono);
    font-size: 0.7rem;
  }
  .detail-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    color: var(--foreground-2);
    text-align: center;
    gap: 12px;
  }
  .detail-empty .empty-icon {
    opacity: 0.3;
  }
  .detail-empty p {
    font-size: 0.8rem;
    line-height: 1.5;
  }

  /* 鈹€鈹€ Log area (within detail) 鈹€鈹€ */
  .log-area {
    background: var(--background);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-family: var(--font-mono);
    font-size: 0.65rem;
    line-height: 1.6;
    max-height: 160px;
    overflow-y: auto;
    color: var(--foreground-2);
  }
  .log-area .log-line { white-space: pre-wrap; word-break: break-all; }
  .log-area .log-line.error { color: var(--danger); }
  .log-area .log-line.warn { color: var(--warning); }
  .log-area .log-line.info { color: var(--primary); }

  /* 鈹€鈹€ Animations 鈹€鈹€ */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in {
    animation: fadeIn 350ms ease-out;
  }

  /* 鈹€鈹€ Loading state 鈹€鈹€ */
  .skeleton {
    background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s ease-in-out infinite;
    border-radius: 4px;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* 鈹€鈹€ Responsive tweaks 鈹€鈹€ */
  @media (max-width: 1200px) {
    .dashboard-grid {
      grid-template-columns: 1fr 320px;
      gap: 16px;
      padding: 16px;
    }
    .kpi-row { grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .kpi-card { padding: 12px 14px; }
    .kpi-card .kpi-value { font-size: 1.4rem; }
  }

  @media (max-width: 900px) {
    .dashboard-grid {
      grid-template-columns: 1fr;
    }
    .detail-panel {
      position: static;
      max-height: none;
    }
    .kpi-row { grid-template-columns: repeat(3, 1fr); }
    .kpi-row .kpi-card:nth-child(4),
    .kpi-row .kpi-card:nth-child(5) { display: none; }
  }

  @media (max-width: 600px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .kpi-row .kpi-card:nth-child(5) { display: none; }
    .toolbar-search { display: none; }
    .app-header { padding: 10px 16px; flex-wrap: wrap; gap: 8px; }
  }

  /* 鈹€鈹€ Focus ring 鈹€鈹€ */
  :focus-visible {
    outline: 2px solid var(--primary);
    outline-offset: 2px;
    border-radius: 4px;
  }

  /* 鈹€鈹€ Tailwind overrides for this theme 鈹€鈹€ */
  .tw-override input,
  .tw-override button,
  .tw-override select,
  .tw-override textarea {
    font-family: var(--font-sans);
  }
</style>
</head>
<body>

<!-- 鈹€鈹€ HEADER 鈹€鈹€ -->
<header class="app-header" role="banner">
  <div class="app-logo">
    <i data-lucide="cpu" size="20" style="color: var(--primary);"></i>
    <span>Agent Cluster</span>
    <span class="badge">v2.1.0</span>
  </div>
  <div class="app-header-actions">
    <span class="status-indicator" aria-label="Cluster status">
      <span class="status-dot" aria-hidden="true"></span>
      Connected
    </span>
    <button class="toolbar-btn" aria-label="Refresh all data" onclick="refreshAll()">
      <i data-lucide="refresh-cw" size="14"></i>
      <span>Refresh</span>
    </button>
  </div>
</header>

<!-- 鈹€鈹€ DASHBOARD GRID 鈹€鈹€ -->
<main class="dashboard-grid" role="main" aria-label="Dashboard">

  <!-- 鈹€鈹€ KPI ROW 鈹€鈹€ -->
  <section class="kpi-row" aria-label="Key performance indicators">
    <div class="kpi-card kpi-total" aria-label="Total tasks">
      <div class="kpi-top">
        <span class="kpi-label">Total Tasks</span>
        <span class="kpi-icon"><i data-lucide="list-checks" size="16"></i></span>
      </div>
      <div class="kpi-value" id="kpi-total">鈥?/div>
    </div>
    <div class="kpi-card kpi-running" aria-label="Running tasks">
      <div class="kpi-top">
        <span class="kpi-label">Running</span>
        <span class="kpi-icon"><i data-lucide="play-circle" size="16"></i></span>
      </div>
      <div class="kpi-value" id="kpi-running">鈥?/div>
    </div>
    <div class="kpi-card kpi-done" aria-label="Done tasks">
      <div class="kpi-top">
        <span class="kpi-label">Done</span>
        <span class="kpi-icon"><i data-lucide="check-circle" size="16"></i></span>
      </div>
      <div class="kpi-value" id="kpi-done">鈥?/div>
    </div>
    <div class="kpi-card kpi-failed" aria-label="Failed tasks">
      <div class="kpi-top">
        <span class="kpi-label">Failed</span>
        <span class="kpi-icon"><i data-lucide="alert-circle" size="16"></i></span>
      </div>
      <div class="kpi-value" id="kpi-failed">鈥?/div>
    </div>
    <div class="kpi-card kpi-agents" aria-label="Agents">
      <div class="kpi-top">
        <span class="kpi-label">Agents</span>
        <span class="kpi-icon"><i data-lucide="bot" size="16"></i></span>
      </div>
      <div class="kpi-value" id="kpi-agents">鈥?/div>
    </div>
  </section>

  <!-- 鈹€鈹€ TASKS PANEL (Left) 鈹€鈹€ -->
  <section class="tasks-panel" aria-label="Task list">
    <div class="tasks-panel-header">
      <h2><i data-lucide="list-todo" size="16" style="margin-right: 6px; vertical-align: middle;"></i>Tasks</h2>
      <span style="font-size:0.7rem;color:var(--foreground-2);font-family:var(--font-mono)" id="task-count-label">0 total</span>
    </div>

    <!-- Filter tabs -->
    <div class="filter-tabs" role="tablist" aria-label="Filter by status">
      <button class="filter-tab active" role="tab" aria-selected="true" data-status="all" onclick="setFilter('all')">
        All <span class="count-badge" id="count-all">0</span>
      </button>
      <button class="filter-tab" role="tab" aria-selected="false" data-status="pending" onclick="setFilter('pending')">
        Pending <span class="count-badge" id="count-pending">0</span>
      </button>
      <button class="filter-tab" role="tab" aria-selected="false" data-status="in_progress" onclick="setFilter('in_progress')">
        In Progress <span class="count-badge" id="count-in_progress">0</span>
      </button>
      <button class="filter-tab" role="tab" aria-selected="false" data-status="done" onclick="setFilter('done')">
        Done <span class="count-badge" id="count-done">0</span>
      </button>
      <button class="filter-tab" role="tab" aria-selected="false" data-status="failed" onclick="setFilter('failed')">
        Failed <span class="count-badge" id="count-failed">0</span>
      </button>
      <button class="filter-tab" role="tab" aria-selected="false" data-status="cancelled" onclick="setFilter('cancelled')">
        Cancelled <span class="count-badge" id="count-cancelled">0</span>
      </button>
    </div>

    <!-- Toolbar -->
    <div class="toolbar" role="toolbar" aria-label="Task actions">
      <button class="toolbar-btn primary" aria-label="Create new task" onclick="showNewTaskModal()">
        <i data-lucide="plus" size="14"></i>
        <span>New</span>
      </button>
      <button class="toolbar-btn" aria-label="Refresh task list" onclick="loadTasks()">
        <i data-lucide="refresh-cw" size="14"></i>
        <span>Refresh</span>
      </button>
      <button class="toolbar-btn danger" aria-label="Delete selected task" onclick="deleteSelected()">
        <i data-lucide="trash-2" size="14"></i>
        <span>Delete</span>
      </button>
      <div class="toolbar-spacer"></div>
      <div class="toolbar-search">
        <i data-lucide="search" size="13" style="color:var(--foreground-2);flex-shrink:0;"></i>
        <input type="text" placeholder="Search tasks..." aria-label="Search tasks" id="task-search" oninput="applySearch()">
      </div>
    </div>

    <!-- Table -->
    <div class="task-table-wrapper" role="region" aria-label="Tasks table">
      <table class="task-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Assignee</th>
            <th>Updated</th>
          </tr>
        </thead>
        <tbody id="task-tbody">
          <!-- rendered by JS -->
        </tbody>
      </table>
    </div>
  </section>

  <!-- 鈹€鈹€ DETAIL PANEL (Right) 鈹€鈹€ -->
  <aside class="detail-panel" aria-label="Task detail" id="detail-panel">
    <div class="detail-header">
      <h3 id="detail-title">Task Details</h3>
      <button class="detail-close" aria-label="Close detail panel" onclick="clearSelection()">
        <i data-lucide="x" size="16"></i>
      </button>
    </div>
    <div class="detail-body" id="detail-body">
      <!-- populated by JS -->
    </div>
  </aside>

</main>

<!-- 鈹€鈹€ NEW TASK MODAL (simple overlay) 鈹€鈹€ -->
<div id="new-task-overlay" style="display:none;position:fixed;inset:0;background:oklch(0 0 0 / 0.6);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);" role="dialog" aria-modal="true" aria-label="New task form">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:480px;box-shadow:var(--shadow-md);animation:fadeIn 300ms ease-out;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h3 style="font-size:1rem;font-weight:600;">New Task</h3>
      <button style="background:none;border:none;color:var(--foreground-2);cursor:pointer;padding:4px;" onclick="closeNewTaskModal()" aria-label="Close modal">
        <i data-lucide="x" size="18"></i>
      </button>
    </div>
    <form id="new-task-form" onsubmit="createTask(event)" style="display:flex;flex-direction:column;gap:14px;">
      <div>
        <label style="display:block;font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--foreground-2);margin-bottom:4px;">Title</label>
        <input type="text" required style="width:100%;padding:8px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;color:var(--foreground);font-size:0.85rem;font-family:var(--font-sans);outline:none;" placeholder="e.g. Run model evaluation" id="new-task-title">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div>
          <label style="display:block;font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--foreground-2);margin-bottom:4px;">Priority</label>
          <select style="width:100%;padding:8px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;color:var(--foreground);font-size:0.85rem;font-family:var(--font-sans);outline:none;" id="new-task-priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
            <option value="critical">Critical</option>
          </select>
        </div>
        <div>
          <label style="display:block;font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--foreground-2);margin-bottom:4px;">Assignee</label>
          <input type="text" style="width:100%;padding:8px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;color:var(--foreground);font-size:0.85rem;font-family:var(--font-sans);outline:none;" placeholder="agent-id" id="new-task-assignee">
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px;">
        <button type="button" class="toolbar-btn" onclick="closeNewTaskModal()">Cancel</button>
        <button type="submit" class="toolbar-btn primary">Create Task</button>
      </div>
    </form>
  </div>
</div>

<script>
/* 鈹€鈹€ State 鈹€鈹€ */
const state = {
  tasks: [],
  agents: [],
  stats: { total: 0, running: 0, done: 0, failed: 0 },
  filter: 'all',
  search: '',
  selectedId: null,
};

/* 鈹€鈹€ DOM refs 鈹€鈹€ */
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

/* 鈹€鈹€ Init 鈹€鈹€ */
document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  loadTasks();
  loadAgents();
  // Auto-refresh every 15s
  setInterval(() => { loadTasks(); loadAgents(); }, 15000);
});

/* 鈹€鈹€ Data fetching 鈹€鈹€ */
async function loadTasks() {
  try {
    const res = await fetch('/api/tasks');
    const data = await res.json();
    state.tasks = data.tasks || [];
    state.stats = data.stats || {};
    renderAll();
  } catch (err) {
    console.error('Failed to load tasks:', err);
    // Use fallback demo data if API unavailable
    fallbackData();
    renderAll();
  }
}

async function loadAgents() {
  try {
    const res = await fetch('/api/agents');
    const data = await res.json();
    state.agents = Array.isArray(data) ? data : (data.agents || []);
    updateKPI('kpi-agents', state.agents.length);
    lucide.createIcons();
  } catch (err) {
    console.error('Failed to load agents:', err);
    updateKPI('kpi-agents', '鈥?);
  }
}

/* 鈹€鈹€ Fallback demo data 鈹€鈹€ */
function fallbackData() {
  state.tasks = [
    { id: 'T-001', title: 'Eval codex-v2 on benchmark', priority: 'high', status: 'in_progress', assignee: 'agent-alpha', updated: '2024-12-02T14:32:00Z', logs: ['[info] Starting evaluation...', '[info] Running test suite #42', '[warn] Memory usage at 78%'] },
    { id: 'T-002', title: 'Deploy model checkpoint', priority: 'critical', status: 'pending', assignee: 'agent-beta', updated: '2024-12-02T13:15:00Z', logs: [] },
    { id: 'T-003', title: 'Run regression tests', priority: 'medium', status: 'done', assignee: 'agent-gamma', updated: '2024-12-02T12:00:00Z', logs: ['[info] All 1423 tests passed', '[info] Coverage: 91%'] },
    { id: 'T-004', title: 'Fine-tune on custom dataset', priority: 'high', status: 'failed', assignee: 'agent-alpha', updated: '2024-12-02T10:45:00Z', logs: ['[error] OOM at epoch 3, batch size too large', '[error] Training terminated'] },
    { id: 'T-005', title: 'Export logs to S3 bucket', priority: 'low', status: 'cancelled', assignee: 'agent-delta', updated: '2024-12-01T22:10:00Z', logs: [] },
    { id: 'T-006', title: 'Validate API response format', priority: 'medium', status: 'done', assignee: 'agent-beta', updated: '2024-12-01T20:30:00Z', logs: [] },
    { id: 'T-007', title: 'Benchmark inference latency', priority: 'high', status: 'in_progress', assignee: 'agent-gamma', updated: '2024-12-02T15:00:00Z', logs: ['[info] Warming up model...', '[info] Running 100 iterations'] },
  ];
  state.stats = { total: 7, running: 2, done: 2, failed: 1 };
  state.agents = [
    { id: 'agent-alpha', status: 'busy', tasks: 3 },
    { id: 'agent-beta', status: 'idle', tasks: 2 },
    { id: 'agent-gamma', status: 'busy', tasks: 2 },
    { id: 'agent-delta', status: 'offline', tasks: 1 },
  ];
}

/* 鈹€鈹€ Render 鈹€鈹€ */
function renderAll() {
  computeStats();
  renderKPIs();
  renderFilterCounts();
  renderTaskTable();
  renderDetail();
  updateTaskCountLabel();
  lucide.createIcons();
}

function computeStats() {
  const s = { total: state.tasks.length, running: 0, done: 0, failed: 0 };
  state.tasks.forEach(t => {
    if (t.status === 'in_progress') s.running++;
    else if (t.status === 'done') s.done++;
    else if (t.status === 'failed') s.failed++;
  });
  state.stats = s;
}

function renderKPIs() {
  updateKPI('kpi-total', state.stats.total);
  updateKPI('kpi-running', state.stats.running);
  updateKPI('kpi-done', state.stats.done);
  updateKPI('kpi-failed', state.stats.failed);
}

function updateKPI(id, value) {
  const el = document.getElementById(id);
  if (el) el.textContent = value;
}

function renderFilterCounts() {
  const counts = { all: state.tasks.length, pending: 0, in_progress: 0, done: 0, failed: 0, cancelled: 0 };
  state.tasks.forEach(t => {
    if (counts.hasOwnProperty(t.status)) counts[t.status]++;
  });
  Object.entries(counts).forEach(([k, v]) => {
    const el = document.getElementById('count-' + k);
    if (el) el.textContent = v;
  });
}

function updateTaskCountLabel() {
  const el = document.getElementById('task-count-label');
  if (el) el.textContent = state.tasks.length + ' total';
}

function renderTaskTable() {
  const tbody = document.getElementById('task-tbody');
  if (!tbody) return;

  let filtered = state.tasks;
  if (state.filter !== 'all') {
    filtered = filtered.filter(t => t.status === state.filter);
  }
  if (state.search) {
    const q = state.search.toLowerCase();
    filtered = filtered.filter(t =>
      t.id.toLowerCase().includes(q) ||
      t.title.toLowerCase().includes(q) ||
      (t.assignee && t.assignee.toLowerCase().includes(q))
    );
  }

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px 20px;color:var(--foreground-2);font-size:0.8rem;">
      <i data-lucide="inbox" size="24" style="display:block;margin:0 auto 8px;opacity:0.3"></i>
      No tasks match the current filter.
    </td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(t => {
    const selected = t.id === state.selectedId ? ' selected' : '';
    const updated = formatDate(t.updated);
    const prioDot = `<span class="priority-badge ${t.priority || 'low'}" aria-hidden="true"></span>`;
    const statusBadge = `<span class="status-badge ${t.status || 'pending'}">${t.status || 'pending'}</span>`;
    return `<tr class="fade-in${selected}" data-id="${escapeHtml(t.id)}" onclick="selectTask('${escapeHtml(t.id)}')" tabindex="0" role="row">
      <td><span class="task-id">${escapeHtml(t.id)}</span></td>
      <td><span class="task-title" title="${escapeHtml(t.title)}">${escapeHtml(t.title)}</span></td>
      <td>${prioDot}${t.priority || '鈥?}</td>
      <td>${statusBadge}</td>
      <td>${t.assignee ? escapeHtml(t.assignee) : '<span style="color:var(--foreground-2)">鈥?/span>'}</td>
      <td><span style="font-size:0.7rem;color:var(--foreground-2);font-family:var(--font-mono)">${updated}</span></td>
    </tr>`;
  }).join('');

  lucide.createIcons();
}

function renderDetail() {
  const body = document.getElementById('detail-body');
  if (!body) return;

  const task = state.tasks.find(t => t.id === state.selectedId);
  if (!task) {
    body.innerHTML = `
      <div class="detail-empty">
        <div class="empty-icon"><i data-lucide="mouse-pointer-2" size="32"></i></div>
        <p>Select a task from the list to view its details, logs, and configuration.</p>
      </div>
    `;
    lucide.createIcons();
    return;
  }

  body.innerHTML = `
    <div class="detail-section">
      <h4>Overview</h4>
      <div class="detail-field">
        <span class="field-label">ID</span>
        <span class="field-value mono">${escapeHtml(task.id)}</span>
      </div>
      <div class="detail-field">
        <span class="field-label">Title</span>
        <span class="field-value">${escapeHtml(task.title)}</span>
      </div>
      <div class="detail-field">
        <span class="field-label">Status</span>
        <span class="field-value"><span class="status-badge ${task.status || 'pending'}">${task.status || 'pending'}</span></span>
      </div>
      <div class="detail-field">
        <span class="field-label">Priority</span>
        <span class="field-value">${task.priority || '鈥?}</span>
      </div>
      <div class="detail-field">
        <span class="field-label">Assignee</span>
        <span class="field-value mono">${task.assignee || '鈥?}</span>
      </div>
      <div class="detail-field">
        <span class="field-label">Updated</span>
        <span class="field-value mono">${formatDate(task.updated)}</span>
      </div>
    </div>
    ${task.logs && task.logs.length ? `
    <div class="detail-section">
      <h4>Logs (${task.logs.length})</h4>
      <div class="log-area">
        ${task.logs.map(line => {
          const cls = line.includes('[error]') ? 'error' : line.includes('[warn]') ? 'warn' : 'info';
          return `<div class="log-line ${cls}">${escapeHtml(line)}</div>`;
        }).join('')}
      </div>
    </div>` : `
    <div class="detail-section">
      <h4>Logs</h4>
      <div style="font-size:0.75rem;color:var(--foreground-2);">No logs available.</div>
    </div>`}
    <div class="detail-section" style="display:flex;gap:6px;">
      <button class="toolbar-btn" style="flex:1;" onclick="retryTask('${escapeHtml(task.id)}')" aria-label="Retry task">
        <i data-lucide="rotate-ccw" size="13"></i> Retry
      </button>
      <button class="toolbar-btn danger" style="flex:1;" onclick="cancelTask('${escapeHtml(task.id)}')" aria-label="Cancel task">
        <i data-lucide="ban" size="13"></i> Cancel
      </button>
    </div>
  `;
  lucide.createIcons();
}

/* 鈹€鈹€ Interactions 鈹€鈹€ */
function setFilter(status) {
  state.filter = status;
  $$('.filter-tab').forEach(tab => {
    const active = tab.dataset.status === status;
    tab.classList.toggle('active', active);
    tab.setAttribute('aria-selected', active);
  });
  renderTaskTable();
}

function applySearch() {
  state.search = document.getElementById('task-search').value;
  renderTaskTable();
}

function selectTask(id) {
  state.selectedId = (state.selectedId === id) ? null : id;
  renderTaskTable();
  renderDetail();
}

function clearSelection() {
  state.selectedId = null;
  renderTaskTable();
  renderDetail();
}

function deleteSelected() {
  if (!state.selectedId) return;
  if (!confirm('Delete task ' + state.selectedId + '?')) return;
  // Optimistic removal
  state.tasks = state.tasks.filter(t => t.id !== state.selectedId);
  state.selectedId = null;
  renderAll();
  // Attempt real DELETE
  fetch('/api/tasks/' + state.selectedId, { method: 'DELETE' }).catch(() => {});
}

function retryTask(id) {
  const task = state.tasks.find(t => t.id === id);
  if (!task) return;
  task.status = 'pending';
  renderAll();
  fetch('/api/tasks/' + id + '/retry', { method: 'POST' }).catch(() => {});
}

function cancelTask(id) {
  const task = state.tasks.find(t => t.id === id);
  if (!task) return;
  task.status = 'cancelled';
  renderAll();
  fetch('/api/tasks/' + id + '/cancel', { method: 'POST' }).catch(() => {});
}

function refreshAll() {
  loadTasks();
  loadAgents();
}

/* 鈹€鈹€ New Task Modal 鈹€鈹€ */
function showNewTaskModal() {
  const overlay = document.getElementById('new-task-overlay');
  overlay.style.display = 'flex';
  document.getElementById('new-task-title').value = '';
  document.getElementById('new-task-priority').value = 'medium';
  document.getElementById('new-task-assignee').value = '';
  document.getElementById('new-task-title').focus();
}

function closeNewTaskModal() {
  document.getElementById('new-task-overlay').style.display = 'none';
}

async function createTask(event) {
  event.preventDefault();
  const title = document.getElementById('new-task-title').value.trim();
  if (!title) return;
  const priority = document.getElementById('new-task-priority').value;
  const assignee = document.getElementById('new-task-assignee').value.trim();

  const newTask = {
    id: 'T-' + String(Date.now()).slice(-6),
    title,
    priority,
    status: 'pending',
    assignee: assignee || null,
    updated: new Date().toISOString(),
    logs: [],
  };

  state.tasks.unshift(newTask);
  closeNewTaskModal();
  renderAll();

  try {
    await fetch('/api/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(newTask),
    });
  } catch (err) {
    console.error('POST /api/tasks failed:', err);
  }
}

/* 鈹€鈹€ Utility 鈹€鈹€ */
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"']/g, function (m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    if (m === '"') return '&quot;';
    if (m === "'") return '&#39;';
    return m;
  });
}

function formatDate(iso) {
  if (!iso) return '鈥?;
  try {
    const d = new Date(iso);
    const pad = (n) => String(n).padStart(2, '0');
    return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' +
           pad(d.getHours()) + ':' + pad(d.getMinutes());
  } catch (e) {
    return iso;
  }
}

/* 鈹€鈹€ Keyboard navigation for table rows 鈹€鈹€ */
document.addEventListener('click', (e) => {
  const row = e.target.closest('tr[data-id]');
  if (row) {
    selectTask(row.dataset.id);
  }
});

// Close detail panel with Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') clearSelection();
  if (e.key === 'Escape' && document.getElementById('new-task-overlay').style.display === 'flex') {
    closeNewTaskModal();
  }
});

// Arrow key navigation in task table
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    const rows = $$('#task-tbody tr[data-id]');
    if (!rows.length) return;
    let idx = -1;
    rows.forEach((r, i) => { if (r.dataset.id === state.selectedId) idx = i; });
    if (e.key === 'ArrowDown') {
      idx = Math.min(idx + 1, rows.length - 1);
    } else {
      idx = Math.max(idx - 1, 0);
    }
    e.preventDefault();
    selectTask(rows[idx].dataset.id);
    rows[idx].scrollIntoView({ block: 'nearest' });
  }
});

// Auto-load on ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {});
} else {
  // Already loaded 鈥?ensure init runs
}
</script>
</body>
</html>
