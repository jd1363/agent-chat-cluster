<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Chat Cluster - Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1a1d29 0%, #252839 100%); padding: 20px 30px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; }
.header h1 { font-size: 22px; color: #7ec8e3; }
.header .status { display: flex; align-items: center; gap: 10px; }
.header .status .dot { width: 10px; height: 10px; border-radius: 50%; background: #4caf50; box-shadow: 0 0 6px #4caf50; }
.header .status .dot.red { background: #f44336; box-shadow: 0 0 6px #f44336; }
.header .status .dot.yellow { background: #ff9800; box-shadow: 0 0 6px #ff9800; }
.container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; max-width: 1600px; margin: 0 auto; }
.panel { background: #1a1d29; border-radius: 10px; padding: 20px; border: 1px solid #2a2d3a; }
.panel h2 { font-size: 16px; color: #9e9e9e; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
.full-width { grid-column: 1 / -1; }

/* Agent cards */
.agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
.agent-card { background: #232639; border-radius: 8px; padding: 16px; border: 1px solid #333; transition: border-color 0.2s; }
.agent-card:hover { border-color: #555; }
.agent-card.disabled { opacity: 0.45; filter: grayscale(0.8); }
.agent-card .agent-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.agent-card .agent-name { font-size: 17px; font-weight: 600; color: #e0e0e0; }
.agent-card .agent-id { font-size: 12px; color: #666; margin-top: 2px; }
.agent-card .agent-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.agent-card .badge-enabled { background: #1b5e20; color: #4caf50; }
.agent-card .badge-disabled { background: #424242; color: #9e9e9e; }
.agent-card .executor-tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; background: #2a2d3a; color: #7ec8e3; margin-top: 8px; }
.agent-card .executor-tag .icon { width: 14px; height: 14px; opacity: 0.7; }
.agent-card .agent-meta { font-size: 12px; color: #888; margin-top: 8px; display: flex; flex-wrap: wrap; gap: 10px; }
.agent-card .agent-meta span { display: inline-flex; align-items: center; gap: 3px; }

/* Task list */
.task-list { max-height: 400px; overflow-y: auto; }
.task-item { padding: 10px 12px; border-bottom: 1px solid #2a2d3a; display: flex; align-items: center; justify-content: space-between; }
.task-item:last-child { border-bottom: none; }
.task-item .task-title { font-size: 14px; }
.task-item .task-status { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.status-pending { background: #1a237e; color: #5c8aff; }
.status-running { background: #1b5e20; color: #4caf50; }
.status-done { background: #1b5e20; color: #66bb6a; }
.status-failed { background: #4a1525; color: #f44336; }
.status-cancelled { background: #424242; color: #9e9e9e; }

/* Messages */
.msg-list { max-height: 350px; overflow-y: auto; }
.msg-item { padding: 8px 12px; border-bottom: 1px solid #2a2d3a; font-size: 13px; }
.msg-item .msg-from { color: #7ec8e3; font-weight: 600; }
.msg-item .msg-time { color: #666; font-size: 11px; }

/* Alerts */
.alert-item { padding: 10px 14px; border-radius: 6px; margin-bottom: 8px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
.alert-red { background: #2a1520; border: 1px solid #4a1525; }
.alert-yellow { background: #2a2615; border: 1px solid #4a3a15; }
.alert-green { background: #152a18; border: 1px solid #1b5e20; }

/* Execute button */
.exec-btn { padding: 4px 12px; border-radius: 4px; border: 1px solid #1b5e20; background: #1b3a1f; color: #4caf50; font-size: 12px; cursor: pointer; transition: all 0.2s; }
.exec-btn:hover { background: #2a5a2f; border-color: #4caf50; }
.exec-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #1a1d29; }
::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

/* Loading */
.loading { text-align: center; padding: 20px; color: #666; }

/* Responsive */
@media (max-width: 900px) {
    .container { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
    <h1>🤖 Agent Chat Cluster</h1>
    <div class="status">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">Connecting...</span>
    </div>
</div>

<div class="container">
    <!-- Agents Panel -->
    <div class="panel full-width">
        <h2>Agents</h2>
        <div class="agents-grid" id="agents-grid">
            <div class="loading">Loading agents...</div>
        </div>
    </div>

    <!-- Tasks Panel -->
    <div class="panel">
        <h2>Tasks</h2>
        <div class="task-list" id="task-list">
            <div class="loading">Loading tasks...</div>
        </div>
    </div>

    <!-- Messages Panel -->
    <div class="panel">
        <h2>Recent Messages</h2>
        <div class="msg-list" id="msg-list">
            <div class="loading">Loading messages...</div>
        </div>
    </div>

    <!-- Alerts Panel -->
    <div class="panel full-width">
        <h2>Alerts</h2>
        <div id="alerts-list">
            <div class="loading">Loading alerts...</div>
        </div>
    </div>
</div>

<script>
// --- Helper functions ---
async function fetchJSON(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
}

function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function timeAgo(ts) {
    if (!ts) return '';
    const diff = Date.now() - new Date(ts).getTime();
    if (diff < 60000) return 'just now';
    if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
    return Math.floor(diff/86400000) + 'd ago';
}

// Executor icon mapping (simple text-based icons)
const executorIcons = {
    'codex': '⚡',
    'codewhale': '🐋',
    'opencode': '📂',
    'ollama': '🦙',
    'mimo': '🎮',
    'hermes': '✉️',
};

function getExecutorIcon(command) {
    return executorIcons[command] || '🔧';
}

// --- Render functions ---

function renderAgents(data) {
    const grid = document.getElementById('agents-grid');
    if (!data.agents || data.agents.length === 0) {
        grid.innerHTML = '<div class="loading">No agents configured.</div>';
        return;
    }
    grid.innerHTML = data.agents.map(a => {
        const displayName = escapeHtml(a.displayName || a.id);
        const agentId = escapeHtml(a.id);
        const enabled = a.enabled !== false;
        const executorCmd = escapeHtml(a.executorCommand || 'N/A');
        const executorType = escapeHtml(a.executorType || 'N/A');
        const icon = getExecutorIcon(a.executorCommand);
        const role = escapeHtml(a.role || 'unknown');
        const riskLevel = escapeHtml(a.riskLevel || 'unknown');
        const badgeClass = enabled ? 'badge-enabled' : 'badge-disabled';
        const badgeText = enabled ? 'ACTIVE' : 'DISABLED';
        const cardClass = enabled ? 'agent-card' : 'agent-card disabled';

        return `
        <div class="${cardClass}">
            <div class="agent-header">
                <div>
                    <div class="agent-name">${displayName}</div>
                    <div class="agent-id">${agentId}</div>
                </div>
                <span class="agent-badge ${badgeClass}">${badgeText}</span>
            </div>
            <div class="executor-tag">
                <span class="icon">${icon}</span>
                ${executorCmd}
                <span style="color:#555;margin-left:4px;">· ${executorType}</span>
            </div>
            <div class="agent-meta">
                <span>Role: ${role}</span>
                <span>Risk: ${riskLevel}</span>
            </div>
        </div>`;
    }).join('');
}

function renderTasks(data) {
    const list = document.getElementById('task-list');
    if (!data.tasks || data.tasks.length === 0) {
        list.innerHTML = '<div class="loading">No tasks found.</div>';
        return;
    }
    list.innerHTML = data.tasks.slice().reverse().map(t => {
        const status = escapeHtml(t.status || 'unknown');
        const title = escapeHtml(t.title || t.id);
        const assignee = escapeHtml(t.assignee || '—');
        const taskId = escapeHtml(t.id);
        const isPending = status === 'pending';
        const executeBtn = isPending
            ? `<button class="exec-btn" onclick="executeTask('${taskId}')">▶ Execute</button>`
            : '';
        return `
        <div class="task-item">
            <div>
                <div class="task-title">${title}</div>
                <div style="font-size:11px;color:#666;">Assigned: ${assignee}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
                ${executeBtn}
                <span class="task-status status-${status}">${status}</span>
            </div>
        </div>`;
    }).join('');
}

function renderMessages(data) {
    const list = document.getElementById('msg-list');
    if (!data.entries || data.entries.length === 0) {
        list.innerHTML = '<div class="loading">No messages.</div>';
        return;
    }
    list.innerHTML = data.entries.map(m => {
        const from = escapeHtml(m.from || m.fromId || 'unknown');
        const to = escapeHtml(m.to || m.toId || 'unknown');
        const msg = escapeHtml((m.message || m.content || '').substring(0, 100));
        const time = m.timestamp || m.ts || '';
        return `
        <div class="msg-item">
            <span class="msg-from">${from}</span> → <span style="color:#7ec8e3">${to}</span>
            <span class="msg-time" style="float:right;">${timeAgo(time)}</span>
            <div style="margin-top:4px;color:#aaa;">${msg}</div>
        </div>`;
    }).join('');
}

function renderAlerts(data) {
    const list = document.getElementById('alerts-list');
    const dot = document.getElementById('status-dot');
    const text = document.getElementById('status-text');

    if (data.level === 'green') {
        dot.className = 'dot';
        text.textContent = 'All systems normal';
    } else if (data.level === 'yellow') {
        dot.className = 'dot yellow';
        text.textContent = 'Warnings';
    } else {
        dot.className = 'dot red';
        text.textContent = 'Critical issues';
    }

    if (!data.alerts || data.alerts.length === 0) {
        list.innerHTML = '<div class="alert-item alert-green">✅ All systems normal.</div>';
        return;
    }
    list.innerHTML = data.alerts.map(a => {
        const cls = a.level === 'red' ? 'alert-red' : 'alert-yellow';
        const icon = a.level === 'red' ? '🔴' : '🟡';
        return `<div class="alert-item ${cls}">${icon} ${escapeHtml(a.text)}</div>`;
    }).join('');
}

// --- Execute task ---
async function executeTask(taskId) {
    if (!confirm(`Start execution of ${taskId}?`)) return;
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = '⏳ Starting...';
    try {
        const res = await fetch('/api/tasks/execute', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id: taskId})
        });
        const data = await res.json();
        if (data.ok) {
            btn.textContent = '✅ Started';
            setTimeout(loadAll, 2000);
        } else {
            alert('Execution failed: ' + (data.error || 'Unknown error'));
            btn.disabled = false;
            btn.textContent = '▶ Execute';
        }
    } catch (e) {
        alert('Request failed: ' + e.message);
        btn.disabled = false;
        btn.textContent = '▶ Execute';
    }
}

// --- Data loading ---
async function loadAll() {
    try {
        const [agents, tasks, messages, alerts] = await Promise.all([
            fetchJSON('/api/agents'),
            fetchJSON('/api/tasks'),
            fetchJSON('/api/messages?limit=30'),
            fetchJSON('/api/alerts'),
        ]);
        renderAgents(agents);
        renderTasks(tasks);
        renderMessages(messages);
        renderAlerts(alerts);
    } catch (e) {
        console.error('Load error:', e);
        document.getElementById('status-text').textContent = 'Error: ' + e.message;
    }
}

// --- SSE for real-time updates ---
function connectSSE() {
    const es = new EventSource('/api/stream/events');
    es.addEventListener('message', (e) => {
        try {
            const msg = JSON.parse(e.data);
            if (msg.type === 'tasks') renderTasks(msg.data);
            else if (msg.type === 'agents') renderAgents(msg.data);
            else if (msg.type === 'audit') {
                // Could show audit notifications
            }
        } catch (err) {
            console.warn('SSE parse error:', err);
        }
    });
    es.onerror = () => {
        document.getElementById('status-text').textContent = 'Reconnecting...';
    };
}

// --- Init ---
loadAll();
connectSSE();
// Refresh every 30s as fallback
setInterval(loadAll, 30000);
</script>

</body>
</html>
