<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Chat Cluster — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --card: rgba(255,255,255,.45);
  --card-hover: rgba(255,255,255,.6);
  --card-solid: #fff;
  --border: rgba(255,255,255,.5);
  --border-soft: rgba(200,210,230,.35);
  --text: #1a2332;
  --text2: #5a6a80;
  --text3: #8c9ab0;
  --blue: #4a7cff;
  --blue2: #6c9cff;
  --green: #22c55e;
  --amber: #f59e0b;
  --radius: 18px;
  --radius-sm: 10px;
  --shadow: 0 4px 24px rgba(80,100,160,.08);
  --shadow-lg: 0 12px 40px rgba(80,100,160,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;color:var(--text);min-height:100vh;position:relative;background:radial-gradient(ellipse 800px 600px at 15% 10%,rgba(165,195,245,.55),transparent 60%),radial-gradient(ellipse 700px 500px at 85% 20%,rgba(140,175,235,.5),transparent 60%),radial-gradient(ellipse 900px 700px at 50% 60%,rgba(175,200,250,.55),transparent 65%),radial-gradient(ellipse 600px 500px at 80% 75%,rgba(210,190,240,.45),transparent 60%),radial-gradient(ellipse 650px 500px at 20% 80%,rgba(150,185,240,.5),transparent 60%),linear-gradient(135deg,#edf2fb 0%,#e8eef8 100%);background-attachment:fixed}
body::before,body::after{content:'';position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(60px)}
body::before{width:700px;height:700px;top:-150px;left:-100px;background:radial-gradient(circle,rgba(160,190,245,.4),transparent 70%);animation:float1 22s ease-in-out infinite}
body::after{width:650px;height:650px;bottom:-200px;right:-100px;background:radial-gradient(circle,rgba(160,170,235,.35),transparent 70%);animation:float2 26s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(60px,40px) scale(1.08)}}
@keyframes float2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-50px,-60px) scale(1.1)}}
.wrapper{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:0 24px 40px}
.header{display:flex;align-items:center;justify-content:space-between;padding:20px 0;margin-bottom:20px}
.header h1{font-size:24px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:10px}
.header h1 .logo{font-size:28px}
.header-right{display:flex;align-items:center;gap:24px}
.status-pill{display:flex;align-items:center;gap:8px;padding:6px 16px;border-radius:20px;background:var(--card);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border:1px solid var(--border);font-size:13px;font-weight:500}
.status-dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(34,197,94,.5)}
.status-dot.yellow{background:var(--amber);box-shadow:0 0 8px rgba(245,158,11,.5)}
.status-dot.red{background:#f44336;box-shadow:0 0 8px rgba(244,67,54,.5)}
.last-updated{font-size:12px;color:var(--text3)}
.card{background:var(--card);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow);transition:all .3s}
.card:hover{background:var(--card-hover);box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.card-title{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;color:var(--text);margin-bottom:16px}
.card-title::before{content:'';width:3px;height:14px;background:var(--blue);border-radius:2px;flex-shrink:0}
.card-title .count{font-size:12px;color:var(--text3);font-weight:400;margin-left:auto}
.grid-main{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.grid-full{grid-column:1 / -1}
.grid-bottom{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:20px}
.kpi-card{background:var(--card);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);transition:all .3s;text-align:left}
.kpi-card:hover{background:var(--card-hover);box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.kpi-value{font-size:22px;font-weight:800;color:var(--text);line-height:1.2}
.kpi-label{font-size:11px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
.kpi-card.kpi-cost .kpi-value{color:var(--blue)}
.chart-container{position:relative;height:240px}
.agents-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.agent-card{background:rgba(255,255,255,.35);backdrop-filter:saturate(180%) blur(16px);-webkit-backdrop-filter:saturate(180%) blur(16px);border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:16px;transition:all .3s}
.agent-card:hover{background:var(--card-hover);border-color:var(--border);box-shadow:var(--shadow);transform:translateY(-1px)}
.agent-card.disabled{opacity:.45;filter:grayscale(.8)}
.agent-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.agent-name{font-size:16px;font-weight:600;color:var(--text)}
.agent-id{font-size:11px;color:var(--text3);margin-top:2px}
.agent-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.badge-enabled{background:rgba(34,197,94,.15);color:var(--green)}
.badge-disabled{background:rgba(140,154,176,.15);color:var(--text3)}
.executor-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:500;background:rgba(74,124,255,.1);color:var(--blue);margin-top:8px}
.agent-meta{font-size:11px;color:var(--text2);margin-top:10px;display:flex;flex-wrap:wrap;gap:10px}
.task-list{max-height:380px;overflow-y:auto}
.task-item{padding:10px 12px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .2s;border-radius:var(--radius-sm)}
.task-item:hover{background:rgba(255,255,255,.3)}
.task-item.selected{background:rgba(74,124,255,.12);border-left:3px solid var(--blue);padding-left:9px}
.task-item:last-child{border-bottom:none}
.task-title{font-size:14px;font-weight:500;color:var(--text)}
.task-sub{font-size:11px;color:var(--text3);margin-top:2px}
.task-right{display:flex;align-items:center;gap:8px}
.task-status{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.status-pending{background:rgba(92,138,255,.15);color:#5c8aff}
.status-in_progress{background:rgba(74,124,255,.15);color:var(--blue)}
.status-done{background:rgba(34,197,94,.15);color:var(--green)}
.status-failed{background:rgba(244,67,54,.15);color:#f44336}
.status-cancelled{background:rgba(158,158,158,.15);color:#9e9e9e}
.status-running{background:rgba(34,197,94,.15);color:var(--green)}
.pulse-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--blue);margin-right:6px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
.exec-btn{padding:4px 12px;border-radius:6px;border:1px solid rgba(74,124,255,.3);background:rgba(74,124,255,.1);color:var(--blue);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s}
.exec-btn:hover{background:rgba(74,124,255,.2);border-color:var(--blue)}
.exec-btn:disabled{opacity:.5;cursor:not-allowed}
.agent-select{padding:3px 8px;border-radius:6px;border:1px solid var(--border-soft);background:rgba(255,255,255,.5);backdrop-filter:blur(10px);font-size:12px;color:var(--text);outline:none;cursor:pointer}
.create-form{display:none;padding:14px 0;margin-bottom:10px;border-bottom:1px solid var(--border-soft)}
.create-form.open{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.create-form input,.create-form select{padding:6px 12px;border-radius:8px;border:1px solid var(--border-soft);background:rgba(255,255,255,.6);font-size:13px;color:var(--text);outline:none}
.create-form input:focus,.create-form select:focus{border-color:var(--blue)}
.create-form .submit-btn{padding:6px 16px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-size:13px;font-weight:500;cursor:pointer;transition:background .2s}
.create-form .submit-btn:hover{background:#3a6cef}
.create-form .cancel-btn{padding:6px 12px;border-radius:8px;border:1px solid var(--border-soft);background:transparent;color:var(--text2);font-size:13px;cursor:pointer}
.form-toggle{font-size:13px;color:var(--blue);cursor:pointer;font-weight:500;margin-bottom:8px;display:inline-flex;align-items:center;gap:4px}
.log-panel{background:#1a1d29;border-radius:var(--radius-sm);padding:16px;height:380px;overflow-y:auto;font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:12px;line-height:1.6;color:#4caf50}
.log-line{white-space:pre-wrap;word-break:break-all}
.log-line.log-info{color:#6c9cff}
.log-line.log-error{color:#f44336}
.log-line.log-warn{color:#f59e0b}
.log-status{margin-top:10px;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;display:inline-block}
.log-status.running{background:rgba(74,124,255,.15);color:var(--blue)}
.log-status.done{background:rgba(34,197,94,.15);color:var(--green)}
.log-status.failed{background:rgba(244,67,54,.15);color:#f44336}
.log-empty{color:#5a6a80;text-align:center;padding:60px 0;font-size:13px}
.audit-timeline{max-height:380px;overflow-y:auto;position:relative;padding-left:20px}
.audit-timeline::before{content:'';position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:var(--border-soft)}
.audit-item{position:relative;padding:6px 0 6px 16px;font-size:13px}
.audit-item::before{content:'';position:absolute;left:-19px;top:12px;width:8px;height:8px;border-radius:50%;background:var(--blue);border:2px solid #fff;box-shadow:0 0 4px rgba(74,124,255,.3)}
.audit-item.event-task-created::before{background:var(--green)}
.audit-item.event-task-completed::before{background:var(--green)}
.audit-item.event-task-failed::before{background:#f44336}
.audit-item.event-task-cancelled::before{background:#9e9e9e}
.audit-item.event-task-dispatched::before{background:var(--amber)}
.audit-item.event-message-sent::before{background:var(--blue2)}
.audit-time{font-size:11px;color:var(--text3)}
.audit-event{font-weight:500;color:var(--text)}
.audit-taskid{font-size:11px;color:var(--text2)}
.msg-list{max-height:380px;overflow-y:auto}
.msg-item{padding:8px 0;border-bottom:1px solid var(--border-soft);font-size:13px}
.msg-item:last-child{border-bottom:none}
.msg-from{color:var(--blue);font-weight:600}
.msg-to{color:var(--blue2)}
.msg-time{color:var(--text3);font-size:11px;float:right}
.msg-content{margin-top:4px;color:var(--text2);font-size:12px}
.alert-item{padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:8px;font-size:13px;display:flex;align-items:center;gap:8px}
.alert-red{background:rgba(244,67,54,.1);border:1px solid rgba(244,67,54,.2)}
.alert-yellow{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2)}
.alert-green{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2)}
.footer{text-align:center;padding:20px 0;font-size:12px;color:var(--text3)}
.loading{text-align:center;padding:20px;color:var(--text3)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(140,154,176,.3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(140,154,176,.5)}
@media(max-width:1024px){.kpi-row{grid-template-columns:repeat(3,1fr)}.grid-main,.grid-bottom{grid-template-columns:1fr}}
@media(max-width:768px){.kpi-row{grid-template-columns:repeat(2,1fr)}.header h1{font-size:18px}}

</style>
</head>
<body>
<div class="wrapper">
  <!-- HEADER -->
  <div class="header">
    <h1><span class="logo">🤖</span> Agent Chat Cluster</h1>
    <div class="header-right">
      <div class="status-pill">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Connecting…</span>
      </div>
      <div class="last-updated" id="last-updated">—</div>
    </div>
  </div>

  <!-- KPI ROW -->
  <div class="kpi-row">
    <div class="kpi-card"><div class="kpi-value" id="kpi-total">—</div><div class="kpi-label">总任务</div></div>
    <div class="kpi-card"><div class="kpi-value" id="kpi-pending">—</div><div class="kpi-label">待处理</div></div>
    <div class="kpi-card"><div class="kpi-value" id="kpi-done">—</div><div class="kpi-label">完成</div></div>
    <div class="kpi-card"><div class="kpi-value" id="kpi-failed">—</div><div class="kpi-label">失败</div></div>
    <div class="kpi-card kpi-cost"><div class="kpi-value" id="kpi-cost">—</div><div class="kpi-label">总成本 (USD)</div></div>
  </div>

  <!-- CHARTS ROW -->
  <div class="grid-main">
    <div class="card">
      <div class="card-title">任务状态分布</div>
      <div class="chart-container"><canvas id="chart-tasks"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">成本按 Agent</div>
      <div class="chart-container"><canvas id="chart-cost"></canvas></div>
    </div>
  </div>

  <!-- AGENTS PANEL -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-title">Agents <span class="count" id="agents-count">—</span></div>
    <div class="agents-grid" id="agents-grid">
      <div class="loading">Loading agents…</div>
    </div>
  </div>

  <!-- TASKS + LOG PANEL -->
  <div class="grid-bottom">
    <div class="card">
      <div class="card-title">Tasks <span class="count" id="tasks-count">—</span></div>
      <span class="form-toggle" onclick="toggleCreateForm()">＋ 新建任务</span>
      <div class="create-form" id="create-form">
        <input type="text" id="new-task-title" placeholder="任务标题" style="flex:1;min-width:180px">
        <textarea id="new-task-desc" placeholder="任务详细描述（会原样传给执行Agent）" style="width:100%;min-height:60px;padding:6px 12px;border-radius:8px;border:1px solid var(--border-soft);background:rgba(255,255,255,.6);font-size:13px;color:var(--text);outline:none;resize:vertical;font-family:inherit"></textarea>
        <select id="new-task-priority">
          <option value="low">低</option>
          <option value="medium" selected>中</option>
          <option value="high">高</option>
        </select>
        <button class="submit-btn" onclick="createTask()">创建</button>
        <button class="cancel-btn" onclick="toggleCreateForm()">取消</button>
      </div>
      <div class="task-list" id="task-list">
        <div class="loading">Loading tasks…</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">实时执行日志</div>
      <div class="log-panel" id="log-panel">
        <div class="log-empty">选中一个任务以查看实时日志</div>
      </div>
    </div>
  </div>

  <!-- AUDIT + MESSAGES -->
  <div class="grid-bottom">
    <div class="card">
      <div class="card-title">Audit 时间线</div>
      <div class="audit-timeline" id="audit-timeline">
        <div class="loading">Loading audit…</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Messages</div>
      <div class="msg-list" id="msg-list">
        <div class="loading">Loading messages…</div>
      </div>
    </div>
  </div>

  <!-- ALERTS -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-title">Alerts</div>
    <div id="alerts-list">
      <div class="loading">Loading alerts…</div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer" id="footer">—</div>
</div>

<script>
// === Helpers ===
async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function timeAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() - new Date(ts).getTime();
  if (diff < 0) return 'just now';
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return Math.floor(diff/86400000) + 'd ago';
}

function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// === Executor icons ===
const executorIcons = {codex:'⚡',codewhale:'🐋',opencode:'📂',ollama:'🦙',mimo:'🎮',hermes:'✉️'};
function getExecutorIcon(cmd) { return executorIcons[cmd] || '🔧'; }

// === State ===
let agentsCache = [];
let tasksCache = [];
let selectedTaskId = null;
let logSSE = null;
let taskChart = null;
let costChart = null;

// === KPI ===
function renderKPIs(tasks, cost) {
  const stats = tasks.stats || {};
  const total = (tasks.tasks || []).length;
  document.getElementById('kpi-total').textContent = total;
  document.getElementById('kpi-pending').textContent = stats.pending || 0;
  document.getElementById('kpi-done').textContent = stats.done || 0;
  document.getElementById('kpi-failed').textContent = stats.failed || 0;
  document.getElementById('kpi-cost').textContent = '$' + (cost.totalCost || 0).toFixed(4);
  document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString('zh-CN');
}

// === Charts ===
function initTaskChart(stats) {
  const ctx = document.getElementById('chart-tasks').getContext('2d');
  const labels = ['pending','in_progress','done','failed','cancelled'];
  const colors = ['#5c8aff','#4a7cff','#22c55e','#f44336','#9e9e9e'];
  const data = labels.map(l => stats[l] || 0);
  if (taskChart) { taskChart.data.datasets[0].data = data; taskChart.update(); return; }
  taskChart = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 0 }] },
    options: {
      cutout: '70%',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { font: { size: 11 }, color: '#5a6a80', padding: 8 } }
      }
    }
  });
}

function initCostChart(byAgent) {
  const ctx = document.getElementById('chart-cost').getContext('2d');
  const labels = Object.keys(byAgent);
  const values = labels.map(k => byAgent[k].cost);
  if (costChart) { costChart.data.labels = labels; costChart.data.datasets[0].data = values; costChart.update(); return; }
  costChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: 'rgba(74,124,255,0.6)',
        borderColor: 'rgba(74,124,255,1)',
        borderWidth: 1,
        borderRadius: 4
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(200,210,230,.3)' }, ticks: { color: '#8c9ab0', font: { size: 10 } } },
        y: { grid: { display: false }, ticks: { color: '#5a6a80', font: { size: 11 } } }
      }
    }
  });
}

// === Agents ===
function renderAgents(data) {
  const grid = document.getElementById('agents-grid');
  agentsCache = data.agents || [];
  document.getElementById('agents-count').textContent = agentsCache.length + ' agents';
  if (!agentsCache.length) { grid.innerHTML = '<div class="loading">No agents configured.</div>'; return; }
  grid.innerHTML = agentsCache.map(a => {
    const name = escapeHtml(a.displayName || a.id);
    const id = escapeHtml(a.id);
    const enabled = a.enabled !== false;
    const cmd = escapeHtml(a.executorCommand || 'N/A');
    const type = escapeHtml(a.executorType || 'N/A');
    const icon = getExecutorIcon(a.executorCommand);
    const role = escapeHtml(a.role || 'unknown');
    const risk = escapeHtml(a.riskLevel || 'unknown');
    const badgeCls = enabled ? 'badge-enabled' : 'badge-disabled';
    const badgeTxt = enabled ? 'ACTIVE' : 'DISABLED';
    const cardCls = enabled ? 'agent-card' : 'agent-card disabled';
    return '<div class="'+cardCls+'">' +
      '<div class="agent-header"><div><div class="agent-name">'+name+'</div><div class="agent-id">'+id+'</div></div>' +
      '<span class="agent-badge '+badgeCls+'">'+badgeTxt+'</span></div>' +
      '<div class="executor-tag"><span>'+icon+'</span> '+cmd+' <span style="color:#8c9ab0">· '+type+'</span></div>' +
      '<div class="agent-meta"><span>Role: '+role+'</span><span>Risk: '+risk+'</span></div></div>';
  }).join('');
}

// === Tasks ===
function renderTasks(data) {
  const list = document.getElementById('task-list');
  tasksCache = data.tasks || [];
  document.getElementById('tasks-count').textContent = tasksCache.length + ' tasks';
  if (!tasksCache.length) { list.innerHTML = '<div class="loading">No tasks found.</div>'; return; }
  list.innerHTML = tasksCache.slice().reverse().map(t => {
    const status = escapeHtml(t.status || 'unknown');
    const title = escapeHtml(t.title || t.id);
    const assignee = escapeHtml(t.assignee || '—');
    const tid = escapeHtml(t.id);
    const isPending = status === 'pending';
    const isInProgress = status === 'in_progress' || status === 'running';
    const sel = tid === selectedTaskId ? ' selected' : '';
    let pulseHtml = isInProgress ? '<span class="pulse-dot"></span>' : '';
    let right = '<div class="task-right">';
    if (isPending) {
      right += '<select class="agent-select" id="sel-'+tid+'">' +
        agentsCache.filter(a=>a.enabled!==false).map(a => '<option value="'+escapeHtml(a.id)+'">'+escapeHtml(a.displayName||a.id)+'</option>').join('') +
        '</select>';
      right += '<button class="exec-btn" id="btn-'+tid+'" onclick="executeTask(\''+tid+'\')">▶ Execute</button>';
    }
    right += '<span class="task-status status-'+status+'">'+pulseHtml+status+'</span></div>';
    return '<div class="task-item'+sel+'" onclick="selectTask(\''+tid+'\')">' +
      '<div><div class="task-title">'+title+'</div><div class="task-sub">'+tid+' · '+assignee+'</div></div>' +
      right + '</div>';
  }).join('');
}

// === Create Task ===
function toggleCreateForm() {
  document.getElementById('create-form').classList.toggle('open');
}

async function createTask() {
  const title = document.getElementById('new-task-title').value.trim();
  const desc = document.getElementById('new-task-desc').value.trim();
  const priority = document.getElementById('new-task-priority').value;
  if (!title) { alert('请输入任务标题'); return; }
  try {
    const res = await fetch('/api/tasks/create', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({title, description: desc, priority})
    });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('new-task-title').value = '';
      toggleCreateForm();
      loadAll();
    } else {
      alert('创建失败: ' + (data.error || 'Unknown'));
    }
  } catch(e) {
    alert('请求失败: ' + e.message);
  }
}

// === Execute Task ===
async function executeTask(taskId) {
  const sel = document.getElementById('sel-'+taskId);
  const btn = document.getElementById('btn-'+taskId);
  const assignee = sel ? sel.value : 'agent-exec-01';
  if (!confirm('Start execution of '+taskId+' with '+assignee+'?\\nThis will dispatch + generate prompt + execute real CLI.')) return;
  // 禁用按钮，显示执行中
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Running...'; }
  if (sel) sel.disabled = true;
  try {
    const res = await fetch('/api/tasks/execute', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({id: taskId, assignee: assignee})
    });
    const data = await res.json();
    if (data.ok) {
      selectTask(taskId);
      // 按钮显示启动成功，等 SSE 更新状态
      if (btn) { btn.textContent = '✓ Started'; btn.style.borderColor = 'var(--green)'; btn.style.color = 'var(--green)'; }
      setTimeout(loadAll, 2000);
      // 10秒后恢复按钮（任务可能还在跑，但按钮可以恢复让用户再试）
      setTimeout(() => {
        if (btn) { btn.disabled = false; btn.textContent = '▶ Execute'; btn.style.borderColor = ''; btn.style.color = ''; }
        if (sel) sel.disabled = false;
      }, 10000);
    } else {
      alert('Execution failed: ' + (data.error || 'Unknown'));
      if (btn) { btn.disabled = false; btn.textContent = '▶ Execute'; }
      if (sel) sel.disabled = false;
    }
  } catch(e) {
    alert('Request failed: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = '▶ Execute'; }
    if (sel) sel.disabled = false;
  }
}

// === Task Selection + Log SSE ===
function selectTask(taskId) {
  selectedTaskId = taskId;
  // Re-render to show selection
  renderTasks({tasks: tasksCache, stats: {}});
  // Connect log SSE
  if (logSSE) logSSE.close();
  const panel = document.getElementById('log-panel');
  panel.innerHTML = '';
  logSSE = new EventSource('/api/stream/tasks/'+taskId+'/logs');
  logSSE.addEventListener('message', function(e) {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'log') {
        const line = document.createElement('div');
        line.className = 'log-line';
        const text = msg.data.line || '';
        if (text.includes('[ERROR]') || text.includes('error')) line.classList.add('log-error');
        else if (text.includes('[WARN]') || text.includes('warn')) line.classList.add('log-warn');
        else if (text.includes('[INFO]') || text.includes('info')) line.classList.add('log-info');
        line.textContent = text;
        panel.appendChild(line);
        panel.scrollTop = panel.scrollHeight;
      } else if (msg.type === 'status') {
        const st = msg.data.status || 'unknown';
        let badge = '<div class="log-status running">'+st+'</div>';
        if (st === 'done' || st === 'failed' || st === 'cancelled') {
          badge = '<div class="log-status '+st+'">'+st.toUpperCase()+' ✓</div>';
        }
        const existing = panel.querySelector('.log-status');
        if (existing) existing.remove();
        panel.insertAdjacentHTML('beforeend', badge);
        panel.scrollTop = panel.scrollHeight;
      } else if (msg.type === 'end') {
        const st = msg.data.status || 'done';
        const existing = panel.querySelector('.log-status');
        if (existing) existing.remove();
        panel.insertAdjacentHTML('beforeend', '<div class="log-status '+st+'">'+st.toUpperCase()+' ✓</div>');
        panel.scrollTop = panel.scrollHeight;
        logSSE.close();
      }
    } catch(err) {}
  });
  logSSE.onerror = function() {
    panel.insertAdjacentHTML('beforeend', '<div class="log-line log-warn">— connection lost —</div>');
    panel.scrollTop = panel.scrollHeight;
  };
}

// === Messages ===
function renderMessages(data) {
  const list = document.getElementById('msg-list');
  if (!data.entries || !data.entries.length) { list.innerHTML = '<div class="loading">No messages.</div>'; return; }
  list.innerHTML = data.entries.map(m => {
    const from = escapeHtml(m.from || m.fromId || 'unknown');
    const to = escapeHtml(m.to || m.toId || 'unknown');
    const msg = escapeHtml((m.message || m.content || '').substring(0, 120));
    const time = m.timestamp || m.ts || '';
    return '<div class="msg-item"><span class="msg-time">'+timeAgo(time)+'</span>' +
      '<span class="msg-from">'+from+'</span> → <span class="msg-to">'+to+'</span>' +
      '<div class="msg-content">'+msg+'</div></div>';
  }).join('');
}

// === Audit Timeline ===
function renderAudit(data) {
  const tl = document.getElementById('audit-timeline');
  if (!data.entries || !data.entries.length) { tl.innerHTML = '<div class="loading">No audit entries.</div>'; return; }
  tl.innerHTML = data.entries.map(e => {
    const evt = escapeHtml(e.event || e.type || 'unknown');
    const tid = escapeHtml(e.taskId || e.task_id || e.id || '');
    const time = e.timestamp || e.ts || e.time || '';
    const cls = 'audit-item event-' + (e.event || e.type || '').toLowerCase().replace(/_/g,'-');
    return '<div class="'+cls+'"><div class="audit-time">'+fmtTime(time)+'</div>' +
      '<div class="audit-event">'+evt+'</div>' +
      (tid ? '<div class="audit-taskid">'+tid+'</div>' : '') + '</div>';
  }).join('');
}

// === Alerts ===
function renderAlerts(data) {
  const list = document.getElementById('alerts-list');
  const dot = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  if (data.level === 'green') { dot.className = 'status-dot'; text.textContent = 'All systems normal'; }
  else if (data.level === 'yellow') { dot.className = 'status-dot yellow'; text.textContent = 'Warnings'; }
  else { dot.className = 'status-dot red'; text.textContent = 'Critical issues'; }
  if (!data.alerts || !data.alerts.length) {
    list.innerHTML = '<div class="alert-item alert-green">✅ All systems normal.</div>';
    return;
  }
  list.innerHTML = data.alerts.map(a => {
    const cls = a.level === 'red' ? 'alert-red' : (a.level === 'yellow' ? 'alert-yellow' : 'alert-green');
    const icon = a.level === 'red' ? '🔴' : (a.level === 'yellow' ? '🟡' : '🟢');
    return '<div class="alert-item '+cls+'">'+icon+' '+escapeHtml(a.text)+'</div>';
  }).join('');
}

// === Load All ===
async function loadAll() {
  try {
    const [agents, tasks, messages, alerts, audit, cost] = await Promise.all([
      fetchJSON('/api/agents'),
      fetchJSON('/api/tasks'),
      fetchJSON('/api/messages?limit=30'),
      fetchJSON('/api/alerts'),
      fetchJSON('/api/audit?limit=20'),
      fetchJSON('/api/cost')
    ]);
    agentsCache = agents.agents || [];
    renderAgents(agents);
    renderTasks(tasks);
    renderMessages(messages);
    renderAlerts(alerts);
    renderAudit(audit);
    renderKPIs(tasks, cost);
    initTaskChart(tasks.stats || {});
    initCostChart(cost.byAgent || {});
    document.getElementById('footer').textContent =
      'Data as of ' + new Date().toLocaleString('zh-CN') + ' · Auto-refresh 30s';
  } catch(e) {
    console.error('Load error:', e);
    document.getElementById('status-text').textContent = 'Error: ' + e.message;
  }
}

// === Global SSE ===
function connectSSE() {
  const es = new EventSource('/api/stream/events');
  es.addEventListener('message', function(e) {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'tasks') { renderTasks(msg.data); renderKPIs(msg.data, {}); }
      else if (msg.type === 'agents') renderAgents(msg.data);
      else if (msg.type === 'audit') renderAudit({entries:[msg.data]});
    } catch(err) {}
  });
  es.onerror = function() {
    document.getElementById('status-text').textContent = 'Reconnecting…';
  };
}

// === Init ===
loadAll();
connectSSE();
setInterval(loadAll, 30000);

</script>
